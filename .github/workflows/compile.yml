name: Test Compile ESP32 Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        # Updated to v2.4.0 (or v2) to ensure compatibility with newer Node runners
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform Core
        run: |
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Install Dependencies (Libraries)
        run: |
          arduino-cli lib install "ArduinoJson"
          # Use the stable version that actually contains esp_display_panel.hpp
          arduino-cli lib install "ESP32_Display_Panel"
          # Pin LVGL to v8.4.0
          arduino-cli lib install "lvgl@8.4.0"

      - name: Create Placeholder Secrets File
        run: |
          if [ ! -f secrets.h ]; then
            echo '#define SECRET_SSID "DummySSID"' > secrets.h
            echo '#define SECRET_PASSWORD "DummyPassword"' >> secrets.h
          fi

          # Create the missing lv_conf.h in the libraries directory
          mkdir -p /home/runner/Arduino/libraries/
          cat << 'EOF' > /home/runner/Arduino/libraries/lv_conf.h
          #ifndef LV_CONF_H
          #define LV_CONF_H
          
          #define LV_USE_LOG      1
          #define LV_COLOR_DEPTH  16
          
          /* Include the default LVGL configuration template */
          #include "lvgl/src/extra/lv_extra.h" 
          #endif
          EOF
          
      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 ./esp32_bus_and_weather.ino
